security:
    role_hierarchy:
        ROLE_ADMIN: [ROLE_STAFF, ROLE_USER]
        ROLE_STAFF: [ROLE_USER]
    password_hashers:
        App\Entity\User:
            algorithm: auto
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: username
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            custom_authenticators:
                - App\Security\ApiTokenAuthenticator
        main:
            lazy: true
            provider: app_user_provider

            entry_point: App\Security\LoginAuthenticator

            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                csrf_token_id: authenticate

            custom_authenticators:
                - App\Security\LoginAuthenticator
                - App\Security\GoogleAuthenticator

            logout:
                path: app_logout
                invalidate_session: true

            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /

    access_control:
        - { path: ^/api/(login|register|auth/google)$, roles: PUBLIC_ACCESS }
        - { path: ^/api/admin/users, roles: ROLE_ADMIN }
        - { path: ^/api/admin/orders, roles: ROLE_STAFF }
        - { path: ^/api/admin/(categories|products), roles: ROLE_STAFF }
        - { path: ^/api/users, roles: ROLE_ADMIN }
        - { path: ^/api/data, roles: ROLE_ADMIN }
        - { path: ^/api/products, roles: ROLE_STAFF }
        - { path: ^/api/profile, roles: ROLE_USER }
        - { path: ^/api/customer, roles: ROLE_USER }
        - { path: ^/api/me, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/admin/(staff|users|logs|system|activity-logs|categories|pages|settings), roles: ROLE_ADMIN }
        - { path: ^/admin/dashboard$, roles: ROLE_ADMIN }
        - { path: ^/admin$, roles: ROLE_ADMIN }
        - { path: ^/admin, roles: ROLE_STAFF }
        - { path: ^/cart, roles: ROLE_USER }
        - { path: ^/checkout, roles: ROLE_USER }
        - { path: ^/order/confirmation, roles: ROLE_USER }
        - { path: ^/(profile|profile/edit|change-password|orders), roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
